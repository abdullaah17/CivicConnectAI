<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>SLA Breach Alert</title></head>
<body style="font-family:Arial,sans-serif;background:#f4f4f4;margin:0;padding:20px">
  <div style="max-width:500px;margin:0 auto;background:#fff;border-radius:8px;padding:32px;border-top:4px solid #e02424">
    <h2 style="color:#e02424;margin-top:0">&#9888; SLA Breach Alert</h2>
    <p>Hi <strong>{{ADMIN_NAME}}</strong>,</p>
    <p>Ticket <strong>{{TICKET_NUMBER}}</strong> is approaching its SLA deadline.</p>
    <table style="width:100%;border-collapse:collapse;margin:16px 0">
      <tr><td style="padding:8px;background:#fff5f5;font-weight:bold">Ticket</td><td style="padding:8px">{{TICKET_NUMBER}}</td></tr>
      <tr><td style="padding:8px;background:#fff5f5;font-weight:bold">Title</td><td style="padding:8px">{{TICKET_TITLE}}</td></tr>
      <tr><td style="padding:8px;background:#fff5f5;font-weight:bold">SLA Deadline</td><td style="padding:8px;color:#e02424"><strong>{{SLA_DEADLINE}}</strong></td></tr>
    </table>
    <p>Please take immediate action to resolve this ticket.</p>
    <hr style="border:none;border-top:1px solid #eee;margin:24px 0">
    <p style="color:#888;font-size:12px;margin:0">CivicConnect &mdash; City Government Portal</p>
  </div>
</body>
</html>
