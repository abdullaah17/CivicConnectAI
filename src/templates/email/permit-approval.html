<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Permit Approved</title></head>
<body style="font-family:Arial,sans-serif;background:#f4f4f4;margin:0;padding:20px">
  <div style="max-width:500px;margin:0 auto;background:#fff;border-radius:8px;padding:32px;border-top:4px solid #057a55">
    <h2 style="color:#057a55;margin-top:0">&#10003; Permit Approved</h2>
    <p>Hi <strong>{{APPLICANT_NAME}}</strong>,</p>
    <p>Your permit application has been <strong>approved</strong>.</p>
    <table style="width:100%;border-collapse:collapse;margin:16px 0">
      <tr><td style="padding:8px;background:#f0fdf4;font-weight:bold">Permit Number</td><td style="padding:8px">{{PERMIT_NUMBER}}</td></tr>
      <tr><td style="padding:8px;background:#f0fdf4;font-weight:bold">Type</td><td style="padding:8px">{{PERMIT_TYPE}}</td></tr>
      <tr><td style="padding:8px;background:#f0fdf4;font-weight:bold">Expiry</td><td style="padding:8px">{{EXPIRY_DATE}}</td></tr>
    </table>
    <p>Download your certificate from the CivicConnect portal.</p>
    <hr style="border:none;border-top:1px solid #eee;margin:24px 0">
    <p style="color:#888;font-size:12px;margin:0">CivicConnect &mdash; City Government Portal</p>
  </div>
</body>
</html>
