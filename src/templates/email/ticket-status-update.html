<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Ticket Update</title></head>
<body style="font-family:Arial,sans-serif;background:#f4f4f4;margin:0;padding:20px">
  <div style="max-width:500px;margin:0 auto;background:#fff;border-radius:8px;padding:32px">
    <h2 style="color:#1a56db;margin-top:0">CivicConnect</h2>
    <p>Hi <strong>{{RESIDENT_NAME}}</strong>,</p>
    <p>Your ticket <strong>{{TICKET_NUMBER}}</strong> has been updated.</p>
    <table style="width:100%;border-collapse:collapse;margin:16px 0">
      <tr><td style="padding:8px;background:#f9f9f9;font-weight:bold">Status</td><td style="padding:8px">{{NEW_STATUS}}</td></tr>
      <tr><td style="padding:8px;background:#f9f9f9;font-weight:bold">Title</td><td style="padding:8px">{{TICKET_TITLE}}</td></tr>
    </table>
    <p>Log in to CivicConnect to view full details.</p>
    <hr style="border:none;border-top:1px solid #eee;margin:24px 0">
    <p style="color:#888;font-size:12px;margin:0">CivicConnect &mdash; City Government Portal</p>
  </div>
</body>
</html>
